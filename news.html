<!DOCTYPE html>
<html>
<head>
  <title>GWH News</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
    }

    h1 {
      text-align: center;
      margin: 20px;
      font-size: 40px;
    }

    .container {
      width: 90%;
      max-width: 700px;
      margin: auto;
    }

    .post {
      background: #111;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      border-left: 4px solid gold;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .date {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }

    .content {
      font-size: 15px;
    }

    .nav {
      text-align: center;
      margin-top: 10px;
    }

    .nav a {
      padding: 8px 15px;
      background: gold;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">← Back to Rankings</a>
</div>

<h1>GWH NEWS</h1>

<div class="container" id="news"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWWXihiKZHGLBGPkrmv8mF6GoCh25qb6uo7DnWpRCEEWoS0zeI4Tq9jYXFfThv-8-ag8DDnvkZrvwI/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("news");

    container.innerHTML = "";

    rows.forEach(row => {
      const [date, title, content] = row.split(",");

      if (!title) return;

      const div = document.createElement("div");
      div.className = "post";

      div.innerHTML = `
        <div class="date">${date.trim()}</div>
        <div class="title">${title.trim()}</div>
        <div class="content">${content ? content.trim() : ""}</div>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
