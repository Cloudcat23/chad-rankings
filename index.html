<!DOCTYPE html>
<html>
<head>
  <title>GWH IB CHAD RANKINGS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 50px;
      margin: 20px 0;
      color: white;
      letter-spacing: 2px;
    }

    .list {
      width: 90%;
      max-width: 750px;
      margin: auto;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
      padding: 18px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .row:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rank {
      font-size: 26px;
      width: 60px;
      font-weight: bold;
    }

    .name {
      font-size: 20px;
    }

    img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
    }

    /* TOP 3 STYLING */
    .top1 {
      background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent);
      border: 1px solid gold;
      box-shadow: 0 0 20px gold;
    }

    .top2 {
      background: linear-gradient(90deg, rgba(192,192,192,0.2), transparent);
      border: 1px solid silver;
    }

    .top3 {
      background: linear-gradient(90deg, rgba(205,127,50,0.2), transparent);
      border: 1px solid #cd7f32;
    }

    .votes {
      font-size: 14px;
      color: #aaa;
    }

  </style>
</head>

<body>

<h1>GWH IB CHAD RANKINGS</h1>

<div class="list" id="leaderboard"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWWXihiKZHGLBGPkrmv8mF6GoCh25qb6uo7DnWpRCEEWoS0zeI4Tq9jYXFfThv-8-ag8DDnvkZrvwI/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("leaderboard");

    container.innerHTML = "";

    rows.forEach((row, index) => {
      const [rank, name, img] = row.split(",");

      if (!rank || !name) return;

      let extraClass = "";
      let crown = "";

      if (index === 0) {
        extraClass = "top1";
        crown = "👑";
      } else if (index === 1) {
        extraClass = "top2";
      } else if (index === 2) {
        extraClass = "top3";
      }

      const div = document.createElement("div");
      div.className = "row " + extraClass;

      div.innerHTML = `
        <div class="left">
          <div class="rank">#${rank.trim()}</div>
          ${img ? `<img src="${img.trim()}">` : ""}
          <div class="name">${name.trim()} ${crown}</div>
        </div>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
