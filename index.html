<!DOCTYPE html>
<html>
<head>
  <title>Chad Rankings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 50px;
      color: gold;
      text-shadow: 0 0 20px gold;
      margin: 20px 0;
    }

    .list {
      width: 90%;
      max-width: 700px;
      margin: auto;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111;
      margin: 10px 0;
      padding: 15px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .row:hover {
      transform: scale(1.02);
      background: #1a1a1a;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rank {
      font-size: 24px;
      color: gold;
      width: 50px;
    }

    .name {
      font-size: 20px;
    }

    img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

  </style>
</head>

<body>

<h1>🔥 LIVE CHAD RANKINGS 🔥</h1>

<div class="list" id="leaderboard"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWWXihiKZHGLBGPkrmv8mF6GoCh25qb6uo7DnWpRCEEWoS0zeI4Tq9jYXFfThv-8-ag8DDnvkZrvwI/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const container = document.getElementById("leaderboard");

    rows.forEach(row => {
      const cols = row.split(",");
      if(cols.length < 2) return;

      const rank = cols[0];
      const name = cols[1];
      const img = cols[2];

      const div = document.createElement("div");
      div.className = "row";

      div.innerHTML = `
        <div class="left">
          <div class="rank">#${rank}</div>
          ${img ? `<img src="${img}">` : ""}
          <div class="name">${name}</div>
        </div>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
