<!DOCTYPE html>
<html>
<head>
  <title>GWH IB CHAD RANKINGS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #000, #111, #1a1a1a, #000);
      background-size: 400% 400%;
      animation: bgMove 10s infinite linear;
      color: white;
    }

    @keyframes bgMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      text-align: center;
      font-size: 50px;
      margin: 20px 0;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .list {
      width: 90%;
      max-width: 750px;
      margin: auto;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0;
      padding: 18px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .row:hover {
      transform: scale(1.04);
      box-shadow: 0 0 25px rgba(255,255,255,0.3);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rank {
      font-size: 26px;
      width: 60px;
      font-weight: bold;
    }

    .name {
      font-size: 20px;
    }

    img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    img:hover {
      transform: scale(1.1);
    }

    /* TOP 3 */
    .top1 {
      background: linear-gradient(90deg, rgba(255,215,0,0.25), transparent);
      border: 1px solid gold;
      box-shadow: 0 0 25px gold;
    }

    .top2 {
      background: linear-gradient(90deg, rgba(192,192,192,0.25), transparent);
      border: 1px solid silver;
    }

    .top3 {
      background: linear-gradient(90deg, rgba(205,127,50,0.25), transparent);
      border: 1px solid #cd7f32;
    }

    /* IMPORTANT BOX */
    .important-box {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 200px;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      backdrop-filter: blur(12px);
      text-align: center;
      z-index: 1000;
      animation: floatBox 2s infinite ease-in-out;
    }

    @keyframes floatBox {
      0% {transform: translateY(0);}
      50% {transform: translateY(-5px);}
      100% {transform: translateY(0);}
    }

    .important-box h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .important-box a {
      display: block;
      padding: 10px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .important-box a:hover {
      background: gold;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

<div class="important-box">
  <h3>Important</h3>
  <a href="https://forms.gle/sfRczGHDvChQ5S2SA" target="_blank">
    Submit / Vote
  </a>
</div>

<h1>GWH IB CHAD RANKINGS</h1>

<div class="list" id="leaderboard"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWWXihiKZHGLBGPkrmv8mF6GoCh25qb6uo7DnWpRCEEWoS0zeI4Tq9jYXFfThv-8-ag8DDnvkZrvwI/pub?output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("leaderboard");

    container.innerHTML = "";

    rows.forEach((row, index) => {
      const [rank, name, img] = row.split(",");

      if (!rank || !name) return;

      let extraClass = "";
      let crown = "";

      if (index === 0) {
        extraClass = "top1";
        crown = "👑";
      } else if (index === 1) {
        extraClass = "top2";
      } else if (index === 2) {
        extraClass = "top3";
      }

      const div = document.createElement("div");
      div.className = "row " + extraClass;

      div.innerHTML = `
        <div class="left">
          <div class="rank">#${rank.trim()}</div>
          ${img ? `<img src="${img.trim()}">` : ""}
          <div class="name">${name.trim()} ${crown}</div>
        </div>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
