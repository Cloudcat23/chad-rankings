<!DOCTYPE html>
<html>
<head>
  <title>Chad Rankings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-top: 20px;
      color: gold;
      text-shadow: 0 0 20px gold, 0 0 40px gold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 30px gold, 0 0 60px gold; }
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
      animation: fadeIn 0.8s ease forwards;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px gold;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .number {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      margin-bottom: 10px;
      text-shadow: 0 0 15px gold;
    }

    .name {
      font-size: 22px;
      color: #ddd;
    }

  </style>
</head>

<body>

<h1>🔥 CHAD RANKINGS 🔥</h1>
<p style="color:#888;">Official Rankings • 2026</p>

<div class="container">

  <div class="card">
    <div class="number">#1</div>
    <div class="name">Hemanth</div>
  </div>

  <div class="card">
    <div class="number">#2</div>
    <div class="name">Maheeth</div>
  </div>

  <div class="card">
    <div class="number">#3</div>
    <div class="name">Rahul / Raghav</div>
  </div>

  <div class="card">
    <div class="number">#4</div>
    <div class="name">Achintya</div>
  </div>

  <div class="card">
    <div class="number">#5</div>
    <div class="name">Ram</div>
  </div>

  <div class="card">
    <div class="number">#6</div>
    <div class="name">Sushi</div>
  </div>

  <div class="card">
    <div class="number">#7</div>
    <div class="name">Meer</div>
  </div>

  <div class="card">
    <div class="number">#8</div>
    <div class="name">Vian</div>
  </div>

  <div class="card">
    <div class="number">#9</div>
    <div class="name">Kolhe</div>
  </div>

</div>

</body>
</html>
