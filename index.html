<!DOCTYPE html>
<html>
<head>
  <title>Chad Rankings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      color: gold;
      text-shadow: 0 0 20px gold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 260px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px gold;
    }

    .number {
      font-size: 40px;
      color: gold;
    }

    .name {
      font-size: 22px;
    }
  </style>
</head>

<body>

<h1>🔥 LIVE CHAD RANKINGS 🔥</h1>

<div class="container" id="leaderboard"></div>

<script>
const sheetURL = https://docs.google.com/spreadsheets/d/e/2PACX-1vTWWXihiKZHGLBGPkrmv8mF6GoCh25qb6uo7DnWpRCEEWoS0zeI4Tq9jYXFfThv-8-ag8DDnvkZrvwI/pub?output=csv;

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1); // skip header
    const container = document.getElementById("leaderboard");

    rows.forEach(row => {
      const cols = row.split(",");
      if(cols.length < 2) return;

      const rank = cols[0];
      const name = cols[1];

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="number">#${rank}</div>
        <div class="name">${name}</div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
